<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password · SmartHabbit</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <aside class="auth-aside">
      <a class="brand" href="index.html">
        <span class="brand-logo"><i class="fa-solid fa-bolt"></i></span>
        <span>SmartHabbit</span>
      </a>
      <div class="auth-aside-content">
        <h1>Lost your password?</h1>
        <p>Happens to everyone. Tell us your email and we'll get you back in.</p>
      </div>
    </aside>

    <main class="auth-main">
      <div class="auth-card">
        <a class="back-link" href="login.html"><i class="fa-solid fa-arrow-left"></i> Back to log in</a>
        <h2>Reset your password</h2>
        <p class="auth-sub">Enter the email you used to sign up. If we find your account, you'll get a reset link.</p>

        <form id="forgot-form" novalidate>
          <div class="field">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
            <span class="field-error" data-error-for="email"></span>
          </div>

          <button class="btn btn-primary btn-block btn-lg" type="submit" id="forgot-submit">
            <span class="btn-text">Send reset link</span>
            <span class="spinner hidden" data-spinner></span>
          </button>

          <p class="auth-error" id="form-error" hidden></p>
          <p class="auth-success" id="form-success" hidden>
            <i class="fa-solid fa-circle-check"></i>
            If an account exists for that email, a reset link is on its way.
          </p>
        </form>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script>auth.initForgot();</script>
</body>
</html>
