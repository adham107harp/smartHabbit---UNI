server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA-like behaviour: try the file, then index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache for hashed assets, short for HTML
  location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|ico|woff2?)$ {
    expires 7d;
    access_log off;
  }

  # API proxy → backend container on the docker network
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # User uploads served by the backend's express.static('/uploads')
  location /uploads/ {
    proxy_pass http://backend:3000/uploads/;
    proxy_set_header Host $host;
  }

  # WebSocket upgrade for socket.io
  location /socket.io/ {
    proxy_pass http://backend:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }
}
