<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose new password · SmartHabbit</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <aside class="auth-aside">
      <a class="brand" href="index.html">
        <span class="brand-logo"><i class="fa-solid fa-bolt"></i></span>
        <span>SmartHabbit</span>
      </a>
      <div class="auth-aside-content">
        <h1>One step away.</h1>
        <p>Pick a fresh password and you're back in.</p>
      </div>
    </aside>

    <main class="auth-main">
      <div class="auth-card">
        <a class="back-link" href="login.html"><i class="fa-solid fa-arrow-left"></i> Back to log in</a>
        <h2>Choose a new password</h2>
        <p class="auth-sub">Make it strong. You'll use this one from now on.</p>

        <form id="reset-form" novalidate>
          <div class="field">
            <label for="password">New password</label>
            <div class="password-wrap">
              <input id="password" name="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" required minlength="8">
              <button type="button" class="password-toggle" aria-label="Show password">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
            <div class="password-meter">
              <div class="password-meter-bar"><span data-pw-strength></span></div>
              <small class="text-muted" data-pw-label>At least 8 characters with upper, lower, and a number.</small>
            </div>
            <span class="field-error" data-error-for="password"></span>
          </div>

          <div class="field">
            <label for="confirm">Confirm new password</label>
            <input id="confirm" name="confirm" type="password" autocomplete="new-password" placeholder="Type it again" required minlength="8">
            <span class="field-error" data-error-for="confirm"></span>
          </div>

          <button class="btn btn-primary btn-block btn-lg" type="submit" id="reset-submit">
            <span class="btn-text">Save new password</span>
            <span class="spinner hidden" data-spinner></span>
          </button>

          <p class="auth-error" id="form-error" hidden></p>
          <p class="auth-success" id="form-success" hidden>
            <i class="fa-solid fa-circle-check"></i> Password updated. Redirecting to log in…
          </p>
        </form>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script>auth.initReset();</script>
</body>
</html>
