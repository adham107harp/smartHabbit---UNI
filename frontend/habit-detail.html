<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit details · SmartHabbit</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/habits.css">

  <script src="js/api.js"></script>
  <script src="js/auth-guard.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside data-sidebar></aside>

    <div class="main-area">
      <header data-topbar></header>

      <main class="page">
        <a class="back-link" href="habits.html"><i class="fa-solid fa-arrow-left"></i> Back to habits</a>

        <section class="card detail-hero">
          <div data-detail-content>
            <div class="loading-state"><div class="spinner spinner-lg"></div></div>
          </div>
        </section>

        <div class="dash-grid mt-5">
          <section class="card">
            <div class="card-header">
              <h2 class="card-title">Last 30 days</h2>
              <span class="text-muted" data-30d-summary></span>
            </div>
            <div class="heatmap" data-heatmap></div>
          </section>

          <section class="card">
            <div class="card-header">
              <h2 class="card-title">Recent logs</h2>
            </div>
            <div data-recent-logs>
              <div class="loading-state"><div class="spinner"></div></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="js/ui.js"></script>
  <script src="js/habit-detail.js"></script>
</body>
</html>
